<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arblok Digital — Portfolio Ecosystem</title>
    <style>
        :root {
            --bg: #04080f;
            --card: #0a0f1a;
            --neon: #00ff87; /* Green SekolahPro */
            --cyn: #00e5ff; /* Blue KasirPro */
            --txt: #ffffff;
            --txt-dim: rgba(255, 255, 255, 0.6);
            --bdr: #1a3050;
        }

        body {
            background-color: var(--bg);
            color: var(--txt);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container { max-width: 1000px; width: 100%; padding: 40px 20px; text-align: center; }
        h1 { font-size: 3rem; letter-spacing: -2px; margin-bottom: 10px; background: linear-gradient(90deg, var(--neon), var(--cyn)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .project-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; margin-top: 50px; }
        
        .project-card {
            background: var(--card);
            border: 1px solid var(--bdr);
            border-radius: 20px;
            padding: 40px;
            text-decoration: none;
            transition: 0.3s;
            display: block;
        }

        .project-card:hover { transform: translateY(-10px); border-color: var(--neon); box-shadow: 0 10px 30px rgba(0, 255, 135, 0.1); }
        .project-card.kasir:hover { border-color: var(--cyn); box-shadow: 0 10px 30px rgba(0, 229, 255, 0.1); }

        .icon { font-size: 3rem; margin-bottom: 20px; }
        h2 { margin: 0; color: #fff; font-size: 1.5rem; }
        p { color: var(--txt-dim); margin-top: 10px; line-height: 1.5; }
        
        .footer { margin-top: 60px; font-size: 0.8rem; color: var(--txt-dim); letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="container">
    <h1>ARBLOK DIGITAL</h1>
    <p style="color:var(--txt-dim)">The New Oil Infrastructure Hub</p>

    <div class="project-grid">
        <a href="sekolahpro-demo%20(1).html" class="project-card">
            <div class="icon">🏫</div>
            <h2>SekolahPro</h2>
            <p>Smart CRM, Absensi, & Keuangan Sekolah Digital.</p>
            <small style="color:var(--neon)">Open Live Demo →</small>
        </a>

        <a href="https://kasirproid-app-grosiran.vercel.app/" class="project-card kasir" target="_blank">
            <div class="icon">🛒</div>
            <h2>KasirPro</h2>
            <p>Sistem Kasir Grosir & Toko Skala Besar.</p>
            <small style="color:var(--cyn)">Open Vercel App →</small>
        </a>
    </div>

    <div style="margin-top: 40px; display: flex; justify-content: center; gap: 20px;">
        <a href="arblok-investment-memo.html" style="color:var(--txt-dim); font-size: 0.9rem;">Investment Memo</a>
        <a href="sekolahpro-presentation-1.html" style="color:var(--txt-dim); font-size: 0.9rem;">Presentation Slide</a>
    </div>

    <div class="footer">© 2026 ARBLOK DIGITAL</div>
</div>

</body>
</html>
