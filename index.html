<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arblok Digital — SekolahPro Hub</title>
    <style>
        :root {
            --bg: #04080f;
            --card: #0a0f1a;
            --neon: #00ff87;
            --cyn: #00d4ff;
            --txt: #ffffff;
            --txt-dim: rgba(255, 255, 255, 0.6);
            --bdr: #1a3050;
        }

        body {
            background-color: var(--bg);
            color: var(--txt);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 900px;
            width: 100%;
            padding: 40px 20px;
            text-align: center;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            letter-spacing: -2px;
            margin: 0;
            background: linear-gradient(90deg, var(--neon), var(--cyn));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .grid-links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 50px;
        }

        .link-card {
            background: var(--card);
            border: 1px solid var(--bdr);
            border-radius: 16px;
            padding: 30px;
            text-decoration: none;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .link-card:hover {
            border-color: var(--neon);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 255, 135, 0.1);
        }

        .icon { font-size: 2.5rem; margin-bottom: 15px; }
        .link-card h2 { margin: 0; font-size: 1.25rem; color: var(--txt); }
        .link-card p { font-size: 0.9rem; color: var(--txt-dim); margin: 10px 0 0; }
        .footer { margin-top: 80px; font-size: 0.8rem; color: var(--txt-dim); letter-spacing: 1px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-box">
        <h1>ARBLOK DIGITAL</h1>
        <p style="color:var(--txt-dim)">Smart Education Infrastructure & Ecosystem</p>
    </div>

    <div class="grid-links">
        <a href="arblok-investment-memo.html" class="link-card">
            <div class="icon">📈</div>
            <h2>Investment Memo</h2>
            <p>Riset Valuasi & Strategi Penetrasi Pasar.</p>
        </a>

        <a href="sekolahpro-presentation-1.html" class="link-card">
            <div class="icon">📂</div>
            <h2>Presentation</h2>
            <p>Slide Dek Strategis Stakeholder.</p>
        </a>

        <a href="sekolahpro-demo%20(1).html" class="link-card">
            <div class="icon">🚀</div>
            <h2>Live Demo</h2>
            <p>Eksplorasi Fitur SekolahPro.</p>
        </a>
    </div>

    <div class="footer">
        &copy; 2026 ARBLOK DIGITAL · BUILT FOR THE NEW OIL
    </div>
</div>

</body>
</html>
